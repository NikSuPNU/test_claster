# Система поднимает Spark, Jupyter, Kafka, Kafka UI, все сервисы поднимаются в одной сети
# -----------------------------------------------------------
# Для Kafka используются 2 брокера и 2 контроллера
# Kafka UI подключается к обоим брокерам
# -----------------------------------------------------------
# Spark поднимается в режиме мастера и воркера
# Spark и Jupyter монтируют общий том для работы с данными
# Spark и Jupyter поднимаются с поддержкой Python 3.12
# Jupyter поднимается с поддержкой Spark

# Верссии используемые при развертывании:
  # Spark используется образ spark.v.1.2
  # Jupyter - notebook.v.10
  # Kafka - apache/kafka:latest
  # Kafka UI - provectuslabs/kafka-ui:latest

# Общая сеть для всех сервисов - claster_network
# Общий том для Spark и Jupyter - shared-data
services:

# Сервисы Spark
  # spark: '8885:8080', 8886:7077'
  # spark-worker: '8081:8081'
  # jupyter_notebook: '8887:8888', '4040:4040'
  # data_container: '8082:8082'
  # controller-1: '9093:9093'
  # controller-2: '9094:9094'
  # broker-1: '9092:9092'
  # broker-2: '9095:9095'
  # kafka-ui: '8080:8080'
  # airflow: '8079:8080'
    

# Сервисы Spark
  spark:
    # container_name: spark
    image: spark.v.1.2
    user: root
    depends_on:
      - data_container
    volumes:
      - shared-data:/home/data  # Монтируем общий том
      - ../spark:/home/code
    env_file:
      - ./.env
    environment:
      - SPARK_MASTER_HOST=spark
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - PYSPARK_PYTHON=/usr/local/bin/python3.12
      - PYSPARK_DRIVER_PYTHON=/usr/local/bin/python3.12
    ports:
      - '8885:8080'
      - '8886:7077'
    networks:
      - claster_network
    extra_hosts:
      - "host.docker.internal:${HOST_IP}"
    command: >
          /bin/bash -c 
          "
          /opt/bitnami/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark --port 7077"
  spark-worker:
    image: spark.v.1.2
    user: root
    depends_on:
      - spark
    command: >
          /bin/bash -c 
          "/opt/bitnami/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark:7077"
    volumes:
      - shared-data:/home/data  # Тот же общий том
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark:7077
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - SPARK_USER=spark
      - PYSPARK_PYTHON=/usr/local/bin/python3.12
      - PYSPARK_DRIVER_PYTHON=/usr/local/bin/python3.12
    extra_hosts:
      - "host.docker.internal:${HOST_IP}"
    networks:
      - claster_network

  # Сервисы Jupyter
  jupyter_notebook:
    user: root
    container_name: notebook
    image: notebook.v.10
    volumes:
      - shared-data:/home/data  # Монтируем общий том
      - ../jupyter:/home/jovyan/work
    ports:
      - '8887:8888'
      - '4040:4040'
    networks:
      - claster_network
    extra_hosts:
      - "host.docker.internal:${HOST_IP}"
    command: >
      bash -c "
      python3.12 -m ipykernel install --user --name p3.12 --display-name 'Python3.12' &&
      jupyter notebook --ip 0.0.0.0 --port 8888 --NotebookApp.token='*' --NotebookApp.allow_root=True --NotebookApp.notebook_dir=/home/jovyan/work"
    environment:
      - PYSPARK_PYTHON=/usr/bin/python3.12
      - PYSPARK_DRIVER_PYTHON=/usr/bin/python3.12
      - CONDA_PYTHON_EXE=/usr/bin/python3.12
  # Сервисы Data Container (рудимент)
  data_container: 
    # container_name: data_container
    image: data_container
    volumes:
      - shared-data:/home/data  # Монтируем общий том
    extra_hosts:
      - "host.docker.internal:${HOST_IP}"
    networks:
      - claster_network
    command: >
      /bin/sh -c "chmod -R 777 /home/data && sleep infinity"
  # Сервисы Kafka
  controller-1:
    image: apache/kafka:latest
    container_name: controller-1
    hostname: controller-1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://controller-1:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - claster_network

  controller-2:
    image: apache/kafka:latest
    hostname: controller-2
    container_name: controller-2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: controller
      KAFKA_LISTENERS: CONTROLLER://controller-2:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - claster_network

  broker-1:
    image: apache/kafka:latest
    container_name: broker-1
    ports:
      - 29092:9092
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-1:19092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - controller-1
      - controller-2
    networks:
      - claster_network 
    volumes:
      - ../kafka/log_dirs_1:/tmp/kafka-logs-1
  broker-2:
    image: apache/kafka:latest
    container_name: broker-2
    ports:
      - 39092:9092
    environment:
      KAFKA_NODE_ID: 4
      KAFKA_PROCESS_ROLES: broker
      KAFKA_LISTENERS: 'PLAINTEXT://:19092,PLAINTEXT_HOST://:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://broker-2:19092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@controller-1:9093,2@controller-2:9093
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    depends_on:
      - controller-1
      - controller-2
    networks:
      - claster_network
    volumes:
      - ../kafka/log_dirs_2:/tmp/kafka-logs-2
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - 8080:8080
    environment:
      - KAFKA_CLUSTERS_0_NAME=localhost
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=broker-1:29092,broker-2:29092
    depends_on:
      - broker-1
      - broker-2
      - controller-1
      - controller-2
    networks:
      - claster_network 

    
volumes:
  shared-data:  # Объявление общего тома
    driver: local  # Использование локального драйвера

networks:
  claster_network:
    driver: bridge
